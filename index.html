<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>TariffSnap</title>

  <!-- PWA FIX (GitHub Pages path) -->

  <link rel="manifest" href="/TariffSnap/manifest.json">
  <link rel="icon" href="/TariffSnap/tariffsnap-icon-512.png">
  <meta name="theme-color" content="#1A3C34">
</head>

<body style="margin:0; font-family:Arial; background:#F9F7F2; text-align:center;">

  <h1 style="margin-top:40px;">📸 TariffSnap</h1>
  <p>Scan products. See the real cost.</p>

  <button style="padding:15px 25px; font-size:18px; background:#1A3C34; color:white; border:none; border-radius:10px;">
    Open scanner
  </button>

  <div style="margin-top:40px;">
    <p><strong>Sample pricing:</strong></p>
    <p>Base: $40</p>
    <p>Tariff: $6</p>
    <p>Markup: $4</p>
    <p><strong>Total: $50</strong></p>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/TariffSnap/service-worker.js');
    }
  </script>

</body>
</html>
