<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TariffSnap</title>

  <!-- PWA -->

  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./tariffsnap-icon-512.png">
  <meta name="theme-color" content="#1A3C34">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #F9F7F2;
      text-align: center;
      color: #17342d;
    }

    .card {
      max-width: 420px;
      margin: 40px auto;
      padding: 30px;
      background: linear-gradient(180deg, #1A3C34, #2f5f54);
      color: white;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }

    .btn {
      margin-top: 20px;
      padding: 15px;
      width: 100%;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      background: white;
      color: #1A3C34;
      cursor: pointer;
      font-weight: bold;
    }

    .section {
      max-width: 420px;
      margin: 20px auto;
      padding: 20px;
      background: white;
      border-radius: 15px;
      text-align: left;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    }

    .row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
    }

    .total {
      font-weight: bold;
      color: #e67e22;
    }
  </style>

</head>

<body>

  <div class="card">
    <h1>📸 TariffSnap</h1>
    <p>Scan products. See the real cost.</p>

```
<button class="btn">Open scanner</button>
```

  </div>

  <div class="section">
    <h3>Sample pricing view</h3>

```
<div class="row"><span>Base price</span><span>$40.00</span></div>
<div class="row"><span>Estimated tariff</span><span>$6.00</span></div>
<div class="row"><span>Estimated markup</span><span>$4.00</span></div>
<div class="row total"><span>Total</span><span>$50.00</span></div>
```

  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js');
    }
  </script>

</body>
</html>
